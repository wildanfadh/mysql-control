name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing git tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-linux:
    runs-on: ubuntu-22.04

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Resolve release metadata
        id: release_meta
        run: echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libgdk-pixbuf-2.0-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf

      - name: Build and publish Linux bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.release_meta.outputs.tag }}
          releaseName: MySQL Service Control ${{ steps.release_meta.outputs.tag }}
          releaseBody: |
            Linux release for MySQL Service Control.

            Included artifacts:
            - AppImage for broad Linux compatibility
            - DEB package for Debian and Ubuntu based distributions
          releaseDraft: false
          prerelease: false
